# Base values template for production-like environments (stg, prod)
# Database and cache infrastructure is managed by Terraform, not Helm
global:
  environment: ${ENVIRONMENT:-stg}

# Enable/disable subcharts
postgres:
  enabled: true
web:
  enabled: true
api:
  enabled: true
crons:
  enabled: true

# Web application configuration
cath-web:
  nodejs:
    image: "hmctspublic.azurecr.io/cath/cath-web:${WEB_IMAGE}"
    ingressHost: "${TEAM_NAME}-{{ .Release.Name }}-web.staging.platform.hmcts.net"
    environment:
      BASE_URL: "https://${TEAM_NAME}-{{ .Release.Name }}-web.staging.platform.hmcts.net"
      ENABLE_TEST_SUPPORT: "true"
      MANAGED_IDENTITY_CLIENT_ID: "${MANAGED_IDENTITY_CLIENT_ID}"
    keyVaults:
      cath-ss-kv:
        secrets:
          - name: storageaccount-connection-string
            alias: AZURE_STORAGE_CONNECTION_STRING
          - name: storageaccount-name
            alias: AZURE_STORAGE_ACCOUNT_NAME
          - name: redis-url
            alias: REDIS_URL

# API application configuration
cath-api:
  nodejs:
    image: "hmctspublic.azurecr.io/cath/cath-api:${API_IMAGE}"
    ingressHost: "${TEAM_NAME}-{{ .Release.Name }}-api.staging.platform.hmcts.net"
    environment:
      ENABLE_TEST_SUPPORT: "true"
      MANAGED_IDENTITY_CLIENT_ID: "${MANAGED_IDENTITY_CLIENT_ID}"
    keyVaults:
      cath-ss-kv:
        secrets:
          - name: storageaccount-connection-string
            alias: AZURE_STORAGE_CONNECTION_STRING
          - name: storageaccount-name
            alias: AZURE_STORAGE_ACCOUNT_NAME

# Crons application configuration
cath-crons:
  job:
    image: "hmctspublic.azurecr.io/cath/cath-crons:${CRONS_IMAGE}"
    schedule: "*/5 * * * *"
    suspend: false
    kind: CronJob

# Postgres Prisma Studio service configuration
cath-postgres:
  nodejs:
    image: "hmctspublic.azurecr.io/cath/cath-postgres:${POSTGRES_IMAGE}"
    ingressHost: "${TEAM_NAME}-{{ .Release.Name }}-postgres.staging.platform.hmcts.net"

# Blob storage - DISABLED for stg/prod (managed by Terraform, accessed via Key Vault)
blobstorage:
  enabled: false

# Dev dependencies - DISABLED for stg/prod (managed by Terraform)
postgresql:
  enabled: false

redis:
  enabled: false
