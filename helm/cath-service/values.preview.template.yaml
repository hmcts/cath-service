# Global values shared by all subcharts
global:
  environment: dev
  enableKeyVaults: false
  security:
    allowInsecureImages: true

# Enable/disable subcharts
postgres:
  enabled: true
web:
  enabled: true
api:
  enabled: true
crons:
  enabled: true

# Web application configuration
cath-web:
  nodejs:
    image: "hmctspublic.azurecr.io/cath/cath-web:${WEB_IMAGE}"
    ingressHost: "${TEAM_NAME}-{{ .Release.Name }}-web.dev.platform.hmcts.net"
    environment:
      BASE_URL: "https://${TEAM_NAME}-{{ .Release.Name }}-web.dev.platform.hmcts.net"
      SSO_ALLOW_HTTP_REDIRECT: 'true'
      REDIS_URL: "redis://{{ .Release.Name }}-redis-master:6379"
      POSTGRES_DATABASE: "{{ .Release.Name }}"
    secrets:
      POSTGRES_HOST:
        secretRef: postgres
        key: HOST
      POSTGRES_USER:
        secretRef: postgres
        key: USER
      POSTGRES_PASSWORD:
        secretRef: postgres
        key: PASSWORD
      POSTGRES_PORT:
        secretRef: postgres
        key: PORT

# API application configuration
cath-api:
  nodejs:
    image: "hmctspublic.azurecr.io/cath/cath-api:${API_IMAGE}"
    ingressHost: "${TEAM_NAME}-{{ .Release.Name }}-api.dev.platform.hmcts.net"
    environment:
      POSTGRES_DATABASE: "{{ .Release.Name }}"
    secrets:
      POSTGRES_HOST:
        secretRef: postgres
        key: HOST
      POSTGRES_USER:
        secretRef: postgres
        key: USER
      POSTGRES_PASSWORD:
        secretRef: postgres
        key: PASSWORD
      POSTGRES_PORT:
        secretRef: postgres
        key: PORT

# Crons application configuration
cath-crons:
  job:
    image: "hmctspublic.azurecr.io/cath/cath-crons:${CRONS_IMAGE}"
    schedule: "*/5 * * * *"
    suspend: false
    kind: CronJob
    environment:
      POSTGRES_DATABASE: "{{ .Release.Name }}"
    secrets:
      POSTGRES_HOST:
        secretRef: postgres
        key: HOST
      POSTGRES_USER:
        secretRef: postgres
        key: USER
      POSTGRES_PASSWORD:
        secretRef: postgres
        key: PASSWORD
      POSTGRES_PORT:
        secretRef: postgres
        key: PORT

# Postgres Prisma Studio service configuration
cath-postgres:
  nodejs:
    image: "hmctspublic.azurecr.io/cath/cath-postgres:${POSTGRES_IMAGE}"
    ingressHost: "${TEAM_NAME}-{{ .Release.Name }}-postgres.dev.platform.hmcts.net"
    environment:
      POSTGRES_DATABASE: "{{ .Release.Name }}"
    secrets:
      POSTGRES_HOST:
        secretRef: postgres
        key: HOST
      POSTGRES_USER:
        secretRef: postgres
        key: USER
      POSTGRES_PASSWORD:
        secretRef: postgres
        key: PASSWORD
      POSTGRES_PORT:
        secretRef: postgres
        key: PORT

# PostgreSQL database configuration
postgresql:
  enabled: true
  flexibleserver: cath-dev
  setup:
    databases:
      - name: "{{ .Release.Name }}"

# Redis cache configuration
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: false
  replica:
    replicaCount: 0
  image:
    registry: hmctspublic.azurecr.io
    repository: imported/bitnami/redis
