name: Terraform Bootstrap State Fix

on:
  workflow_dispatch:
    inputs:
      subscription:
        description: "Environment to fix (demo, test, ithc)"
        required: true
        type: choice
        options:
          - demo
          - test
          - ithc

jobs:
  state-fix:
    name: State Fix (${{ inputs.subscription }})
    runs-on: ubuntu-latest
    steps:
      - name: Azure login (DEMO)
        if: inputs.subscription == 'demo'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_SDS_DEMO }}

      - name: Azure login (TEST)
        if: inputs.subscription == 'test'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_SDS_TEST }}

      - name: Azure login (ITHC)
        if: inputs.subscription == 'ithc'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_SDS_ITHC }}

      - name: Remove orphaned module.key_vault resources from state
        run: |
          ENV="${{ inputs.subscription }}"
          STORAGE_ACCOUNT="sdsstate${ENV}"
          CONTAINER="tfstate-${ENV}"
          BLOB="cath-service/${ENV}/terraform.tfstate"
          RESOURCE_GROUP="jenkins-state-${ENV}"

          ACCOUNT_KEY=$(az storage account keys list \
            --account-name "$STORAGE_ACCOUNT" \
            --resource-group "$RESOURCE_GROUP" \
            --query "[0].value" -o tsv)

          # Download current state
          az storage blob download \
            --account-name "$STORAGE_ACCOUNT" \
            --container-name "$CONTAINER" \
            --name "$BLOB" \
            --file /tmp/state.json \
            --account-key "$ACCOUNT_KEY"

          echo "Resources before fix:"
          python3 -c "
          import json
          with open('/tmp/state.json') as f:
              state = json.load(f)
          for r in state.get('resources', []):
              print(f\"  {r.get('module','root')}.{r['type']}.{r['name']}\")
          "

          # Remove module.key_vault resources (orphaned cath-{env} KV - SP can't delete it)
          python3 -c "
          import json
          with open('/tmp/state.json') as f:
              state = json.load(f)
          before = len(state['resources'])
          state['resources'] = [
              r for r in state['resources']
              if r.get('module', '') != 'module.key_vault'
          ]
          after = len(state['resources'])
          print(f'Removed {before - after} module.key_vault resources')
          with open('/tmp/state-fixed.json', 'w') as f:
              json.dump(state, f, indent=2)
          "

          echo "Resources after fix:"
          python3 -c "
          import json
          with open('/tmp/state-fixed.json') as f:
              state = json.load(f)
          for r in state.get('resources', []):
              print(f\"  {r.get('module','root')}.{r['type']}.{r['name']}\")
          "

          # Upload fixed state
          az storage blob upload \
            --account-name "$STORAGE_ACCOUNT" \
            --container-name "$CONTAINER" \
            --name "$BLOB" \
            --file /tmp/state-fixed.json \
            --account-key "$ACCOUNT_KEY" \
            --overwrite

          echo "State updated successfully"
