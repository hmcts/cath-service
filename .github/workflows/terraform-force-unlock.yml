name: Terraform Force Unlock

on:
  workflow_dispatch:
    inputs:
      lock-id:
        description: "Terraform state lock ID to force-unlock"
        required: true
        default: "c749bb56-98e4-f86b-5aa5-6e554657efed"
      working-directory:
        description: "Terraform working directory"
        required: true
        default: "infrastructure"

jobs:
  force-unlock:
    name: Force Unlock Terraform State
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_SDS_STG }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ${{ inputs.working-directory }}
        run: |
          terraform init \
            -backend-config="resource_group_name=jenkins-state-stg" \
            -backend-config="storage_account_name=sdsstatestg" \
            -backend-config="container_name=tfstate-stg" \
            -backend-config="key=cath-service/stg/terraform.tfstate" \
            -backend-config="subscription_id=$(az account show --query id -o tsv)"
        env:
          ARM_CLIENT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS_SDS_STG).clientId }}
          ARM_CLIENT_SECRET: ${{ fromJson(secrets.AZURE_CREDENTIALS_SDS_STG).clientSecret }}
          ARM_SUBSCRIPTION_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS_SDS_STG).subscriptionId }}
          ARM_TENANT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS_SDS_STG).tenantId }}

      - name: Terraform Force Unlock
        working-directory: ${{ inputs.working-directory }}
        run: terraform force-unlock -force "${{ inputs.lock-id }}"
        env:
          ARM_CLIENT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS_SDS_STG).clientId }}
          ARM_CLIENT_SECRET: ${{ fromJson(secrets.AZURE_CREDENTIALS_SDS_STG).clientSecret }}
          ARM_SUBSCRIPTION_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS_SDS_STG).subscriptionId }}
          ARM_TENANT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS_SDS_STG).tenantId }}
