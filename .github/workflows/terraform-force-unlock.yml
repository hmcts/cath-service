name: Terraform Force Unlock

on:
  workflow_dispatch:
    inputs:
      subscription:
        description: "Subscription env suffix (demo, test, ithc, stg)"
        required: true
        type: choice
        options:
          - demo
          - test
          - ithc
          - stg
      lock-id:
        description: "Terraform state lock ID (GUID)"
        required: true
        type: string

jobs:
  force-unlock:
    name: Force Unlock (${{ inputs.subscription }})
    runs-on: ubuntu-latest
    steps:
      - name: Select Azure credentials
        id: creds
        run: |
          case "${{ inputs.subscription }}" in
            demo) echo "secret_name=AZURE_CREDENTIALS_SDS_DEMO" >> $GITHUB_OUTPUT ;;
            test) echo "secret_name=AZURE_CREDENTIALS_SDS_TEST" >> $GITHUB_OUTPUT ;;
            ithc) echo "secret_name=AZURE_CREDENTIALS_SDS_ITHC" >> $GITHUB_OUTPUT ;;
            stg)  echo "secret_name=AZURE_CREDENTIALS_SDS_STG"  >> $GITHUB_OUTPUT ;;
          esac

      - name: Azure login (DEMO)
        if: inputs.subscription == 'demo'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_SDS_DEMO }}

      - name: Azure login (TEST)
        if: inputs.subscription == 'test'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_SDS_TEST }}

      - name: Azure login (ITHC)
        if: inputs.subscription == 'ithc'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_SDS_ITHC }}

      - name: Azure login (STG)
        if: inputs.subscription == 'stg'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_SDS_STG }}

      - name: Break state lock lease
        run: |
          STORAGE_ACCOUNT="sdsstate${{ inputs.subscription }}"
          CONTAINER="tfstate-${{ inputs.subscription }}"
          BLOB="cath-service/${{ inputs.subscription }}/terraform.tfstate"

          echo "Storage account: $STORAGE_ACCOUNT"
          echo "Container: $CONTAINER"
          echo "Blob: $BLOB"
          echo "Lock ID: ${{ inputs.lock-id }}"

          # Break the infinite lease
          az storage blob lease break \
            --account-name "$STORAGE_ACCOUNT" \
            --container-name "$CONTAINER" \
            --blob-name "$BLOB" \
            --auth-mode login

          echo "Lease broken. Verifying..."
          az storage blob show \
            --account-name "$STORAGE_ACCOUNT" \
            --container-name "$CONTAINER" \
            --name "$BLOB" \
            --auth-mode login \
            --query "{leaseState:properties.leaseState, leaseStatus:properties.leaseStatus}" \
            -o table
