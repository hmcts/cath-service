name: E2E Test Job

on:
  workflow_call:
    inputs:
      urls:
        required: true
        type: string
        description: "Base64-encoded JSON of deployment URLs"
      runner-group:
        required: false
        type: string
        description: "GitHub Actions runner group"
        default: "azure-nonprod"

jobs:
  e2e-test:
    name: E2E Tests
    runs-on:
      group: ${{ inputs.runner-group }}
    timeout-minutes: 15
    permissions:
      contents: read
      checks: write
      pull-requests: write
      actions: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Install Playwright browsers
        run: yarn workspace e2e-tests playwright install --with-deps chromium

      - name: Set deployment URLs
        run: |
          # Decode base64-encoded URLs from deploy job
          URLS_B64="${{ inputs.urls }}"
          URLS_JSON=$(echo -n "${URLS_B64}" | base64 -d 2>/dev/null) || {
            echo "::error::Failed to decode base64-encoded deployment URLs"
            exit 1
          }

          # Validate JSON structure
          echo "${URLS_JSON}" | jq . > /dev/null 2>&1 || {
            echo "::error::Invalid JSON in decoded deployment URLs"
            exit 1
          }

          echo "Deployment URLs JSON: ${URLS_JSON}"

          # Extract URLs using jq and set as environment variables
          WEB_URL=$(echo "${URLS_JSON}" | jq -r '.web // empty')
          API_URL=$(echo "${URLS_JSON}" | jq -r '.api // empty')

          if [ -n "${WEB_URL}" ]; then
            echo "CATH_SERVICE_WEB_URL=${WEB_URL}" >> $GITHUB_ENV
            echo "Web URL: ${WEB_URL}"
          else
            echo "::error::No web URL found in deployment"
            exit 1
          fi

          if [ -n "${API_URL}" ]; then
            echo "CATH_SERVICE_API_URL=${API_URL}" >> $GITHUB_ENV
            echo "API URL: ${API_URL}"
          fi

      - name: Azure login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_SDS_STG }}

      - name: Fetch test credentials from Key Vault
        run: |
          fetch() { az keyvault secret show --vault-name cath-stg --name "$1" --query value -o tsv; }
          echo "SSO_TEST_SYSTEM_ADMIN_EMAIL=$(fetch sso-test-system-admin-account-user)" >> $GITHUB_ENV
          echo "SSO_TEST_SYSTEM_ADMIN_PASSWORD=$(fetch sso-test-system-admin-account-pwd)" >> $GITHUB_ENV
          echo "SSO_TEST_LOCAL_ADMIN_EMAIL=$(fetch sso-test-admin-local-account-user)" >> $GITHUB_ENV
          echo "SSO_TEST_LOCAL_ADMIN_PASSWORD=$(fetch sso-test-admin-local-account-pwd)" >> $GITHUB_ENV
          echo "SSO_TEST_CTSC_ADMIN_EMAIL=$(fetch sso-test-admin-account-ctsc-user)" >> $GITHUB_ENV
          echo "SSO_TEST_CTSC_ADMIN_PASSWORD=$(fetch sso-test-admin-account-ctsc-pwd)" >> $GITHUB_ENV
          echo "SSO_TEST_NO_ROLES_EMAIL=$(fetch sso-test-no-roles-account-user)" >> $GITHUB_ENV
          echo "SSO_TEST_NO_ROLES_PASSWORD=$(fetch sso-test-no-roles-account-pwd)" >> $GITHUB_ENV
          echo "CFT_VALID_TEST_ACCOUNT=$(fetch cft-valid-test-account)" >> $GITHUB_ENV
          echo "CFT_VALID_TEST_ACCOUNT_PASSWORD=$(fetch cft-valid-test-account-password)" >> $GITHUB_ENV
          echo "CFT_INVALID_TEST_ACCOUNT=$(fetch cft-invalid-test-account)" >> $GITHUB_ENV
          echo "CFT_INVALID_TEST_ACCOUNT_PASSWORD=$(fetch cft-invalid-test-account-password)" >> $GITHUB_ENV
          echo "AZURE_TENANT_ID=$(fetch app-tenant)" >> $GITHUB_ENV
          echo "AZURE_API_CLIENT_ID=$(fetch app-pip-data-management-id)" >> $GITHUB_ENV
          echo "AZURE_API_CLIENT_SECRET=$(fetch app-pip-data-management-pwd)" >> $GITHUB_ENV
          echo "✅ Fetched all test credentials from Key Vault"

      - name: Run E2E tests
        id: e2e-tests
        run: |
          # Capture all output including server logs
          set -o pipefail
          yarn workspace e2e-tests run test:e2e 2>&1 | tee e2e-server-logs.txt

      # Publish test results to PR checks
      - name: Test Report
        id: test-report
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: E2E Test Results
          path: e2e-tests/junit-results.xml
          reporter: java-junit
          fail-on-error: false
          search-files: filesystem

      # Upload artifacts on failure for debugging
      - name: Upload Playwright test results
        uses: actions/upload-artifact@v6
        if: always() && steps.e2e-tests.outcome == 'failure'
        with:
          name: playwright-test-results
          path: |
            e2e-tests/test-results/
            e2e-tests/playwright-report/
          retention-days: 7

      # Upload application logs on failure for debugging
      - name: Upload application logs
        uses: actions/upload-artifact@v6
        if: always() && steps.e2e-tests.outcome == 'failure'
        with:
          name: application-logs
          path: e2e-server-logs.txt
          retention-days: 7

      # Publish test results as a PR comment
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always() && github.event_name == 'pull_request'
        with:
          files: e2e-tests/junit-results.xml
          check_name: E2E Test Results
          comment_title: 🎭 Playwright E2E Test Results
          fail_on: nothing
