          subprocess.run([
            'az', 'login', '--service-principal',
            '--username', creds['clientId'],
            '--password', creds['clientSecret'],
            '--tenant', creds['tenantId']
          ], check=True)
          subprocess.run(['az', 'account', 'set', '--subscription', creds['subscriptionId']], check=True)
          "

      - name: Delete Test Private Endpoint
        run: |
          az network private-endpoint delete \
            --name cath-test \
            --resource-group cath-cache-test \
            && echo "Deleted PE cath-test in cath-cache-test" \
            || echo "WARNING: PE cath-test may not exist or deletion failed, continuing"

  fix-pe-ithc:
    name: Fix PE - ITHC
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login (ITHC)
        run: |
          echo '${{ secrets.AZURE_CREDENTIALS_SDS_ITHC }}' | python3 -c "
          import sys, json, subprocess
          creds = json.load(sys.stdin)
          subprocess.run([
            'az', 'login', '--service-principal',
            '--username', creds['clientId'],
            '--password', creds['clientSecret'],
            '--tenant', creds['tenantId']
          ], check=True)
          subprocess.run(['az', 'account', 'set', '--subscription', creds['subscriptionId']], check=True)
          "

      - name: Delete ITHC Private Endpoint
        run: |
          az network private-endpoint delete \
            --name cath-ithc \
            --resource-group cath-cache-ithc \
            && echo "Deleted PE cath-ithc in cath-cache-ithc" \
            || echo "WARNING: PE cath-ithc may not exist or deletion failed, continuing"

  fix-pe-stg:
    name: Fix PE - STG
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login (STG)
        run: |
          echo '${{ secrets.AZURE_CREDENTIALS_SDS_STG }}' | python3 -c "
          import sys, json, subprocess
          creds = json.load(sys.stdin)
          subprocess.run([
            'az', 'login', '--service-principal',
            '--username', creds['clientId'],
