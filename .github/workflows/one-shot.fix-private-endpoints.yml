name: One-Shot - Fix Redis Private Endpoints

# Deletes Redis private endpoints from Azure so Terraform can recreate them fresh.
# Required when PEs exist in Azure but not in Terraform state (or point to wrong resource).
#
# Terraform cannot delete the PE because it lacks permission to delete the DNS zone group
# (Microsoft.Network/privateEndpoints/privateDnsZoneGroups/delete).
#
# This workflow:
#   1. Deletes the PE via Azure CLI (which handles DNS zone group cleanup internally)
#   2. Removes the PE from Terraform state (import-redis-rg-and-kv does this too)
#
# After running this workflow:
#   - Run the import-redis-rg-and-kv workflow to ensure state is correct
#   - Retrigger the main infra build - Terraform will create a fresh PE pointing to new Redis

on:
  workflow_dispatch:

jobs:
  fix-pe-demo:
    name: Fix PE - Demo
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login (Demo)
        run: |
          echo '${{ secrets.AZURE_CREDENTIALS_SDS_DEMO }}' | python3 -c "
          import sys, json, subprocess
          creds = json.load(sys.stdin)
          subprocess.run([
            'az', 'login', '--service-principal',
            '--username', creds['clientId'],
            '--password', creds['clientSecret'],
            '--tenant', creds['tenantId']
          ], check=True)
          subprocess.run(['az', 'account', 'set', '--subscription', creds['subscriptionId']], check=True)
          "

      - name: Delete Demo Private Endpoint
        run: |
          # Delete the PE via Azure CLI - this handles DNS zone group cleanup natively
          az network private-endpoint delete \
            --name cath-demo \
            --resource-group cath-cache-demo \
            && echo "Deleted PE cath-demo in cath-cache-demo" \
            || echo "WARNING: PE cath-demo may not exist or deletion failed, continuing"

  fix-pe-test:
    name: Fix PE - Test
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login (Test)
        run: |
          echo '${{ secrets.AZURE_CREDENTIALS_SDS_TEST }}' | python3 -c "
