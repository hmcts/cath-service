            '--tenant', creds['tenantId']
          ], check=True)
          subprocess.run(['az', 'account', 'set', '--subscription', creds['subscriptionId']], check=True)
          "

      - name: Delete STG Private Endpoint
        run: |
          az network private-endpoint delete \
            --name cath-stg \
            --resource-group cath-cache-stg \
            && echo "Deleted PE cath-stg in cath-cache-stg" \
            || echo "WARNING: PE cath-stg may not exist or deletion failed, continuing"
