name: One-Shot - Break Terraform State Locks

on:
  workflow_dispatch:

jobs:
  break-locks:
    name: Break Terraform State Locks
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login (Demo)
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_SDS_DEMO }}

      - name: Break Demo State Lock
        run: |
          az storage blob lease break \
            --account-name sdsstatedemo \
            --container-name tfstate-demo \
            --blob-name "cath-service/demo/terraform.tfstate" \
            --auth-mode login || echo "No lock on demo state"

      - name: Azure Login (Test)
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_SDS_TEST }}

      - name: Break Test State Lock
        run: |
          az storage blob lease break \
            --account-name sdsstatetest \
            --container-name tfstate-test \
            --blob-name "cath-service/test/terraform.tfstate" \
            --auth-mode login || echo "No lock on test state"

      - name: Azure Login (ITHC)
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_SDS_ITHC }}

      - name: Break ITHC State Lock
        run: |
          az storage blob lease break \
            --account-name sdsstateithc \
            --container-name tfstate-ithc \
            --blob-name "cath-service/ithc/terraform.tfstate" \
            --auth-mode login || echo "No lock on ithc state"
