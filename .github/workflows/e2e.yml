name: E2E Tests

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write
  actions: read
  id-token: write

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: hmcts
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hmcts -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 10s

      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 10s

    env:
      # Application configuration
      BASE_URL: https://localhost:8080
      PORT: 8080

      # Database Configuration (using service containers)
      DATABASE_URL: postgresql://hmcts@localhost:5432/postgres
      REDIS_URL: redis://localhost:6379

      # SSO Configuration
      SSO_ALLOW_HTTP_REDIRECT: false

      # CFT IDAM Configuration
      ENABLE_CFT_IDAM: true
      CFT_IDAM_URL: https://idam-web-public.aat.platform.hmcts.net

      # Azure B2C Configuration (mocked in CI until delete endpoint is deployed)
      MOCK_AZURE_B2C: "true"
      MEDIA_FORGOT_PASSWORD_LINK: "https://localhost:8080/forgot-password"

      # GOV.UK Notify template IDs (non-secret)
      GOVUK_NOTIFY_TEMPLATE_ID_SUBSCRIPTION: 5b5c31d0-27a3-466b-b750-bd1a858cd50f
      GOVUK_NOTIFY_TEMPLATE_ID_SUBSCRIPTION_PDF_ONLY: ac63ed12-c179-416d-b9af-83b2b37752bf

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Load credentials and app secrets from bootstrap Key Vault
        run: |
          KV="cath-bootstrap-stg-kv"
          fetch() { az keyvault secret show --vault-name "$KV" --name "$1" --query value -o tsv; }

          # E2E test credentials
          echo "SSO_TEST_SYSTEM_ADMIN_EMAIL=$(fetch sso-test-system-admin-account-user)" >> $GITHUB_ENV
          echo "SSO_TEST_SYSTEM_ADMIN_PASSWORD=$(fetch sso-test-system-admin-account-pwd)" >> $GITHUB_ENV
          echo "SSO_TEST_LOCAL_ADMIN_EMAIL=$(fetch sso-test-admin-local-account-user)" >> $GITHUB_ENV
          echo "SSO_TEST_LOCAL_ADMIN_PASSWORD=$(fetch sso-test-admin-local-account-pwd)" >> $GITHUB_ENV
          echo "SSO_TEST_CTSC_ADMIN_EMAIL=$(fetch sso-test-admin-account-ctsc-user)" >> $GITHUB_ENV
          echo "SSO_TEST_CTSC_ADMIN_PASSWORD=$(fetch sso-test-admin-account-ctsc-pwd)" >> $GITHUB_ENV
          echo "SSO_TEST_NO_ROLES_EMAIL=$(fetch sso-test-no-roles-account-user)" >> $GITHUB_ENV
          echo "SSO_TEST_NO_ROLES_PASSWORD=$(fetch sso-test-no-roles-account-pwd)" >> $GITHUB_ENV
          echo "CFT_VALID_TEST_ACCOUNT=$(fetch cft-valid-test-account)" >> $GITHUB_ENV
          echo "CFT_VALID_TEST_ACCOUNT_PASSWORD=$(fetch cft-valid-test-account-password)" >> $GITHUB_ENV
          echo "CFT_INVALID_TEST_ACCOUNT=$(fetch cft-invalid-test-account)" >> $GITHUB_ENV
          echo "CFT_INVALID_TEST_ACCOUNT_PASSWORD=$(fetch cft-invalid-test-account-password)" >> $GITHUB_ENV
          echo "CRIME_IDAM_VALID_TEST_ACCOUNT=$(fetch crime-valid-test-account)" >> $GITHUB_ENV
          echo "CRIME_IDAM_VALID_TEST_ACCOUNT_PASSWORD=$(fetch crime-valid-test-account-password)" >> $GITHUB_ENV
          echo "GOVUK_NOTIFY_API_KEY=$(fetch gov-uk-notify-test-api-key)" >> $GITHUB_ENV

          # App secrets required at startup
          echo "SESSION_SECRET=$(fetch session-secret)" >> $GITHUB_ENV
          echo "SSO_CLIENT_ID=$(fetch sso-client-id)" >> $GITHUB_ENV
          echo "SSO_CLIENT_SECRET=$(fetch sso-client-secret)" >> $GITHUB_ENV
          echo "SSO_ISSUER_URL=$(fetch sso-issuer-url)" >> $GITHUB_ENV
          echo "SSO_SYSTEM_ADMIN_GROUP_ID=$(fetch sso-sg-system-admin)" >> $GITHUB_ENV
          echo "SSO_INTERNAL_ADMIN_CTSC_GROUP_ID=$(fetch sso-sg-admin-ctsc)" >> $GITHUB_ENV
          echo "SSO_INTERNAL_ADMIN_LOCAL_GROUP_ID=$(fetch sso-sg-admin-local)" >> $GITHUB_ENV
          echo "CFT_IDAM_CLIENT_SECRET=$(fetch cft-idam-client-secret)" >> $GITHUB_ENV
          echo "AZURE_TENANT_ID=$(fetch app-tenant)" >> $GITHUB_ENV
          echo "AZURE_API_CLIENT_ID=$(fetch app-pip-data-management-id)" >> $GITHUB_ENV
          echo "AZURE_API_CLIENT_SECRET=$(fetch app-pip-data-management-pwd)" >> $GITHUB_ENV
          echo "APP_PIP_DATA_MANAGEMENT_SCOPE=$(fetch app-pip-data-management-scope)" >> $GITHUB_ENV

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.13.1'

      - name: Cache Yarn dependencies
        uses: actions/cache@v5
        with:
          path: |
            .yarn/cache
            .yarn/install-state.gz
            node_modules
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Wait for PostgreSQL service to be ready
        run: timeout 30 bash -c 'until pg_isready -h localhost -p 5432 -U hmcts; do sleep 1; done'

      - name: Generate Prisma client
        run: yarn db:generate

      - name: Run database migrations
        run: yarn db:migrate

      - name: Seed test database
        run: |
          echo "Running seed script..."
          yarn workspace @hmcts/postgres run seed
          echo "Seed script completed"

      - name: Verify seed data exists
        run: |
          echo "Verifying seed data for locationId=9..."
          ARTEFACT_COUNT=$(psql $DATABASE_URL -t -c "SELECT COUNT(*) FROM artefact WHERE location_id = '9';")
          ARTEFACT_COUNT=$(echo $ARTEFACT_COUNT | xargs)
          echo "Found $ARTEFACT_COUNT artefacts for locationId=9"
          if [ "$ARTEFACT_COUNT" -lt 3 ]; then
            echo "ERROR: Expected at least 3 seeded artefacts, found $ARTEFACT_COUNT"
            exit 1
          fi
          echo "✓ Seed data verification successful"

      - name: Build packages
        run: yarn build

      - name: Generate self-signed certificates for CI
        run: |
          chmod +x ./scripts/generate-ci-certs.sh
          ./scripts/generate-ci-certs.sh

      - name: Restore Playwright browsers cache
        uses: actions/cache/restore@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('e2e-tests/package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: yarn workspace e2e-tests run playwright install chromium --with-deps

      - name: Install Playwright system dependencies (if cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: yarn workspace e2e-tests run playwright install-deps chromium

      - name: Save Playwright browsers cache
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('e2e-tests/package.json') }}

      - name: Run E2E tests
        id: e2e-tests
        run: |
          # Capture all output including server logs
          set -o pipefail
          yarn workspace e2e-tests run test:e2e 2>&1 | tee e2e-server-logs.txt

      # Publish test results to PR checks
      - name: Test Report
        id: test-report
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: E2E Test Results
          path: e2e-tests/junit-results.xml
          reporter: java-junit
          fail-on-error: false

      # Upload artifacts on failure for debugging   
      - name: Upload Playwright test results
        uses: actions/upload-artifact@v6
        if: always() && steps.e2e-tests.outcome == 'failure'
        with:
          name: playwright-test-results
          path: |
            e2e-tests/test-results/
            e2e-tests/playwright-report/
          retention-days: 7

      # Upload application logs on failure for debugging
      - name: Upload application logs
        uses: actions/upload-artifact@v6
        if: always() && steps.e2e-tests.outcome == 'failure'
        with:
          name: application-logs
          path: e2e-server-logs.txt
          retention-days: 7

      # Publish test results as a PR comment
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always() && github.event_name == 'pull_request'
        with:
          files: e2e-tests/junit-results.xml
          check_name: E2E Test Results
          comment_title: 🎭 Playwright E2E Test Results
          fail_on: nothing