name: One-Shot - Import Secrets and KV Sub-Resources Into State

on:
  workflow_dispatch:

jobs:
  import-secrets-state-demo:
    name: Import Secrets State - Demo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Terraform
        run: |
          wget -qO /tmp/terraform.zip https://releases.hashicorp.com/terraform/1.15.3/terraform_1.15.3_linux_amd64.zip
          unzip -o /tmp/terraform.zip -d /usr/local/bin/
          terraform version

      - name: Azure Login (Demo)
        run: |
          echo '${{ secrets.AZURE_CREDENTIALS_SDS_DEMO }}' | python3 -c "
          import sys, json, subprocess
          creds = json.load(sys.stdin)
          subprocess.run([
            'az', 'login', '--service-principal',
            '--username', creds['clientId'],
            '--password', creds['clientSecret'],
            '--tenant', creds['tenantId']
          ], check=True)
          subprocess.run(['az', 'account', 'set', '--subscription', creds['subscriptionId']], check=True)
          "

      - name: Import Demo Secrets and KV Sub-Resources Into State
        working-directory: infrastructure
        run: |
          STORAGE_KEY=$(az storage account keys list \
            --account-name sdsstatedemo \
            --resource-group jenkins-state-demo \
            --query "[0].value" \
            --output tsv)

          terraform init \
            -backend-config="resource_group_name=jenkins-state-demo" \
            -backend-config="storage_account_name=sdsstatedemo" \
            -backend-config="container_name=tfstate-demo" \
            -backend-config="key=cath-service/demo/terraform.tfstate" \
            -backend-config="access_key=${STORAGE_KEY}"

          KV="https://cath-ss-kv-demo.vault.azure.net"
          SUB="c68a4bed-4c3d-4956-af51-4ae164c1957c"
          KV_ID="/subscriptions/${SUB}/resourceGroups/cath-ss-kv-demo-rg/providers/Microsoft.KeyVault/vaults/cath-ss-kv-demo"

          # Import KV secrets - fetch current version IDs from Azure
          for secret in postgres-host postgres-user postgres-password postgres-port postgres-url \
                        redis-host redis-port redis-access-key redis-url app-insights-connection-string; do
            resource_name=$(echo "$secret" | tr '-' '_')
            # Map secret names to terraform resource names
            case "$secret" in
              app-insights-connection-string) resource_name="app_insights_connection_string" ;;
            esac
            version_id=$(az keyvault secret show --vault-name cath-ss-kv-demo --name "$secret" \
              --query "id" -o tsv 2>/dev/null || true)
            if [ -n "$version_id" ]; then
              terraform import "azurerm_key_vault_secret.${resource_name}" "$version_id" \
                && echo "Imported azurerm_key_vault_secret.${resource_name}" \
                || echo "WARNING: could not import azurerm_key_vault_secret.${resource_name} (may already be in state)"
            else
              echo "WARNING: secret $secret not found in Azure, skipping"
            fi
          done

          # Import KV access policies - fetch object IDs from Azure
          for object_id in $(az keyvault show --name cath-ss-kv-demo \
            --resource-group cath-ss-kv-demo-rg \
            --query "properties.accessPolicies[].objectId" -o tsv 2>/dev/null); do
            policy_id="${KV_ID}/objectId/${object_id}"
            # Try each known policy resource - terraform import will fail gracefully if wrong target
            for resource in \
              "module.application_key_vault.azurerm_key_vault_access_policy.developer[0]" \
              "module.application_key_vault.azurerm_key_vault_access_policy.creator_access_policy" \
              "module.application_key_vault.azurerm_key_vault_access_policy.product_team_access_policy" \
              "module.application_key_vault.azurerm_key_vault_access_policy.implicit_managed_identity_access_policy[0]"; do
              terraform import "$resource" "$policy_id" 2>/dev/null \
                && echo "Imported $resource for objectId $object_id" \
                && break \
                || true
            done
          done

          # Import KV diagnostic setting
          terraform import \
            "module.application_key_vault.azurerm_monitor_diagnostic_setting.kv-ds" \
            "${KV_ID}|cath-ss-kv-demo" \
            && echo "Imported diagnostic setting" \
            || echo "WARNING: could not import diagnostic setting (may already be in state)"

