          # Import the existing cath-ss-kv-test key vault into the module state
          terraform import "module.application_key_vault.azurerm_key_vault.kv" \
            "/subscriptions/${SUB}/resourceGroups/cath-ss-kv-test-rg/providers/Microsoft.KeyVault/vaults/cath-ss-kv-test" \
