name: One-Shot - Import Redis RG and KV Into State

# Patches Terraform state blobs directly to import/fix existing Azure resources:
#   - azurerm_resource_group.redis_rg  (cath-cache-{env})
#   - azurerm_resource_group.ss_kv_rg  (cath-ss-kv-{env}-rg) - REPLACE existing entry
#   - module.application_key_vault.azurerm_key_vault.kv
#   - module.redis.azurerm_redis_cache.redis  (with lowercase resource ID for STG)
#   - module.redis.azurerm_private_endpoint.this[0] - REMOVED from state (let Terraform recreate)
#   - module.application_insights.azurerm_application_insights.this - re-pointed to cath-ss-kv-{env}-rg
#   - module.application_insights.azurerm_monitor_activity_log_alert.main[0] - re-pointed to cath-ss-kv-{env}-rg
#
# This approach bypasses terraform import (which fails due to module config
# evaluation errors) by directly modifying resource entries in the state JSON.
#
# Run this ONCE after the state removal workflow, before retriggering infra.

on:
  workflow_dispatch:

jobs:
  import-demo:
    name: Import - Demo
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login (Demo)
        run: |
          echo '${{ secrets.AZURE_CREDENTIALS_SDS_DEMO }}' | python3 -c "
          import sys, json, subprocess
          creds = json.load(sys.stdin)
          subprocess.run([
            'az', 'login', '--service-principal',
            '--username', creds['clientId'],
            '--password', creds['clientSecret'],
            '--tenant', creds['tenantId']
          ], check=True)
          subprocess.run(['az', 'account', 'set', '--subscription', creds['subscriptionId']], check=True)
          "

      - name: Patch Demo State
        run: |
          SUB="c68a4bed-4c3d-4956-af51-4ae164c1957c"
          STORAGE_KEY=$(az storage account keys list \
            --account-name sdsstatedemo \
            --resource-group jenkins-state-demo \
            --query "[0].value" \
            --output tsv)

          az storage blob download \
            --account-name sdsstatedemo \
            --container-name tfstate-demo \
            --name "cath-service/demo/terraform.tfstate" \
            --file /tmp/terraform.tfstate \
            --account-key "${STORAGE_KEY}"

          # Fetch KV secret version IDs
          rm -f /tmp/secret_ids.txt
          for secret in postgres-host postgres-user postgres-password postgres-port postgres-url \
                        redis-host redis-port redis-access-key redis-url app-insights-connection-string; do
            vid=$(az keyvault secret show --vault-name "cath-ss-kv-demo" --name "$secret" \
              --query "id" -o tsv 2>/dev/null || true)
            [ -n "$vid" ] && echo "${secret}=${vid}" >> /tmp/secret_ids.txt \
              || echo "WARNING: secret $secret not found in vault"
          done

          # Fetch KV access policy object IDs
          az keyvault show --name "cath-ss-kv-demo" --resource-group "cath-ss-kv-demo-rg" \
            --query "properties.accessPolicies[].objectId" -o tsv 2>/dev/null \
            > /tmp/policy_ids.txt || echo "WARNING: could not fetch access policies"
          echo "Access policy object IDs:"
          cat /tmp/policy_ids.txt || true

          # Fetch PE details from Azure
          az network private-endpoint show \
            --name "cath-demo" \
            --resource-group "cath-cache-demo" \
            -o json 2>/dev/null > /tmp/pe_details.json \
            || echo "WARNING: PE cath-demo not found, skipping PE state patch"

          python3 << 'PYEOF'
          import json

          with open('/tmp/terraform.tfstate') as f:
              state = json.load(f)

          resources = state.setdefault('resources', [])
          sub = "c68a4bed-4c3d-4956-af51-4ae164c1957c"
          env = "demo"
          dns_sub = "1baf5470-1c3e-40d3-a6f7-74bfbce4b348"

          def rg_entry(name, rg_name, rg_id):
              return {
                  "module": "", "mode": "managed", "type": "azurerm_resource_group", "name": name,
                  "provider": "provider[\"registry.terraform.io/hashicorp/azurerm\"]",
                  "instances": [{"schema_version": 0, "attributes": {
                      "id": rg_id, "location": "uksouth", "managed_by": "", "name": rg_name, "tags": {}, "timeouts": None
                  }, "sensitive_attributes": [], "private": ""}]
              }

          # azurerm_resource_group.redis_rg
          if not any(r.get('type') == 'azurerm_resource_group' and r.get('name') == 'redis_rg' for r in resources):
              rg_id = f"/subscriptions/{sub}/resourceGroups/cath-cache-{env}"
              resources.append(rg_entry("redis_rg", f"cath-cache-{env}", rg_id))
              print(f"Added azurerm_resource_group.redis_rg -> {rg_id}")
          else:
              print("azurerm_resource_group.redis_rg already in state, skipping")

          # azurerm_resource_group.ss_kv_rg - REPLACE any existing entry (may have wrong name)
          resources[:] = [r for r in resources if not (r.get('type') == 'azurerm_resource_group' and r.get('name') == 'ss_kv_rg')]
          kv_rg_id = f"/subscriptions/{sub}/resourceGroups/cath-ss-kv-{env}-rg"
          resources.append(rg_entry("ss_kv_rg", f"cath-ss-kv-{env}-rg", kv_rg_id))
          print(f"Set azurerm_resource_group.ss_kv_rg -> {kv_rg_id}")

          # module.application_key_vault.azurerm_key_vault.kv
          if not any(r.get('type') == 'azurerm_key_vault' and r.get('name') == 'kv' and r.get('module') == 'module.application_key_vault' for r in resources):
              kv_id = f"/subscriptions/{sub}/resourceGroups/cath-ss-kv-{env}-rg/providers/Microsoft.KeyVault/vaults/cath-ss-kv-{env}"
              resources.append({
                  "module": "module.application_key_vault", "mode": "managed",
                  "type": "azurerm_key_vault", "name": "kv",
                  "provider": "provider[\"registry.terraform.io/hashicorp/azurerm\"]",
                  "instances": [{"schema_version": 2, "attributes": {
                      "id": kv_id, "location": "uksouth", "name": f"cath-ss-kv-{env}",
                      "resource_group_name": f"cath-ss-kv-{env}-rg", "tags": {},
                      "tenant_id": "531ff96d-0ae9-462a-8d2d-bec7c0b42082", "sku_name": "standard",
                      "enabled_for_deployment": False, "enabled_for_disk_encryption": False,
                      "enabled_for_template_deployment": False, "enable_rbac_authorization": False,
                      "purge_protection_enabled": True, "public_network_access_enabled": True,
                      "soft_delete_retention_days": 90, "access_policy": [], "contact": [],
                      "network_acls": [], "timeouts": None,
                      "vault_uri": f"https://cath-ss-kv-{env}.vault.azure.net/"
                  }, "sensitive_attributes": [], "private": ""}]
              })
              print(f"Added module.application_key_vault.azurerm_key_vault.kv")
          else:
              print("module.application_key_vault.azurerm_key_vault.kv already in state, skipping")

          # module.redis.azurerm_redis_cache.redis
          if not any(r.get('type') == 'azurerm_redis_cache' and r.get('name') == 'redis' and r.get('module') == 'module.redis' for r in resources):
              redis_id = f"/subscriptions/{sub}/resourceGroups/cath-cache-{env}/providers/Microsoft.Cache/redis/cath-{env}"
              resources.append({
                  "module": "module.redis", "mode": "managed",
                  "type": "azurerm_redis_cache", "name": "redis",
                  "provider": "provider[\"registry.terraform.io/hashicorp/azurerm\"]",
                  "instances": [{"schema_version": 1, "attributes": {
                      "id": redis_id, "location": "uksouth", "name": f"cath-{env}",
                      "resource_group_name": f"cath-cache-{env}",
                      "capacity": 0, "family": "C", "sku_name": "Basic",
                      "redis_version": "6", "minimum_tls_version": "1.2",
                      "non_ssl_port_enabled": False, "public_network_access_enabled": False,
                      "tags": {}, "timeouts": None,
                      "hostname": f"cath-{env}.redis.cache.windows.net",
                      "ssl_port": 6380, "port": 6379,
                      "primary_access_key": "", "secondary_access_key": "",
                      "primary_connection_string": "", "secondary_connection_string": "",
                      "private_static_ip_address": None, "replicas_per_master": None,
                      "replicas_per_primary": None, "shard_count": 0,
                      "access_keys_authentication_enabled": True,
                      "redis_configuration": [], "patch_schedule": [], "zones": None
                  }, "sensitive_attributes": [
                      [{"type": "get_attr", "value": "primary_access_key"}],
                      [{"type": "get_attr", "value": "secondary_access_key"}],
                      [{"type": "get_attr", "value": "primary_connection_string"}],
                      [{"type": "get_attr", "value": "secondary_connection_string"}]
                  ], "private": ""}]
              })
              print(f"Added module.redis.azurerm_redis_cache.redis")
          else:
              print("module.redis.azurerm_redis_cache.redis already in state, skipping")

          # module.redis.azurerm_private_endpoint.this[0] - add current Azure PE to state
          # PE deletion failed due to AuthorizationFailed (SP lacks privateDnsZoneGroups/delete).
          # Instead, add the existing PE to state so Terraform does not try to create a duplicate.
          import os as _os
          if _os.path.exists('/tmp/pe_details.json') and _os.path.getsize('/tmp/pe_details.json') > 2:
              with open('/tmp/pe_details.json') as pef:
                  pe_az = json.load(pef)
              pe_id = pe_az.get('id', '')
              pe_name = pe_az.get('name', f'cath-{env}')
              pe_location = pe_az.get('location', 'uksouth')
              pe_rg = pe_az.get('resourceGroup', f'cath-cache-{env}')
              # Extract private_connection_resource_id from privateLinkServiceConnections
              plsc = (pe_az.get('privateLinkServiceConnections') or []) + (pe_az.get('manualPrivateLinkServiceConnections') or [])
              private_connection_resource_id = ''
              subresource_names = []
              if plsc:
                  conn = plsc[0]
                  private_connection_resource_id = (conn.get('properties') or {}).get('privateLinkServiceId', '')
                  subresource_names = (conn.get('properties') or {}).get('groupIds', [])
              # Extract subnet_id
              subnet_id = ''
              nic_ids = []
              if pe_az.get('subnet'):
                  subnet_id = pe_az['subnet'].get('id', '')
              for nic in (pe_az.get('networkInterfaces') or []):
                  nic_ids.append(nic.get('id', ''))
              if not any(r.get('type') == 'azurerm_private_endpoint' and r.get('name') == 'this' and r.get('module') == 'module.redis' for r in resources):
                  resources.append({
                      "module": "module.redis", "mode": "managed",
                      "type": "azurerm_private_endpoint", "name": "this",
                      "provider": "provider[\"registry.terraform.io/hashicorp/azurerm\"]",
                      "instances": [{"index_key": 0, "schema_version": 0, "attributes": {
                          "id": pe_id,
                          "location": pe_location,
                          "name": pe_name,
                          "resource_group_name": pe_rg,
                          "subnet_id": subnet_id,
                          "tags": {},
                          "timeouts": None,
                          "custom_dns_configs": [],
                          "custom_network_interface_name": None,
                          "ip_configuration": [],
                          "network_interface": [{"id": nic_ids[0], "name": nic_ids[0].split('/')[-1]} if nic_ids else {}],
                          "private_dns_zone_configs": [],
                          "private_dns_zone_group": [],
                          "private_service_connection": [{
                              "is_manual_connection": False,
                              "name": f"cath-{env}",
                              "private_connection_resource_alias": None,
                              "private_connection_resource_id": private_connection_resource_id,
                              "private_ip_addresses": [],
                              "request_message": None,
                              "subresource_names": subresource_names
                          }]
                      }, "sensitive_attributes": [], "private": ""}]
                  })
                  print(f"Added module.redis.azurerm_private_endpoint.this[0] -> {pe_id}")
              else:
                  print("module.redis.azurerm_private_endpoint.this already in state, skipping")
          else:
              # No PE found in Azure - remove from state so Terraform can create fresh
              before = len(resources)
              resources[:] = [r for r in resources if not (r.get('type') == 'azurerm_private_endpoint' and r.get('name') == 'this' and r.get('module') == 'module.redis')]
              if len(resources) < before:
                  print(f"PE not in Azure - removed module.redis.azurerm_private_endpoint.this from state (will be recreated)")
              else:
                  print(f"PE not in Azure and not in state, nothing to do")

          # module.application_insights.azurerm_application_insights.this - re-point to cath-ss-kv-{env}-rg
          # App insights physically exists in cath-ss-{env}-rg but config wants cath-ss-kv-{env}-rg.
          # Update state to point to correct RG so Terraform sees no diff on the resource group change.
          ai_id_old = f"/subscriptions/{sub}/resourceGroups/cath-ss-{env}-rg/providers/Microsoft.Insights/components/cath-appinsights-{env}"
          ai_id_new = f"/subscriptions/{sub}/resourceGroups/cath-ss-kv-{env}-rg/providers/Microsoft.Insights/components/cath-appinsights-{env}"
          for r in resources:
              if r.get('type') == 'azurerm_application_insights' and r.get('name') == 'this' and r.get('module') == 'module.application_insights':
                  for inst in r.get('instances', []):
                      attrs = inst.get('attributes', {})
                      if attrs.get('id') == ai_id_old:
                          attrs['id'] = ai_id_new
                          attrs['resource_group_name'] = f"cath-ss-kv-{env}-rg"
                          print(f"Updated module.application_insights.azurerm_application_insights.this RG -> cath-ss-kv-{env}-rg")
                      elif attrs.get('id') == ai_id_new:
                          print(f"module.application_insights.azurerm_application_insights.this already pointing to cath-ss-kv-{env}-rg")

          # module.application_insights.azurerm_monitor_activity_log_alert.main[0] - re-point to cath-ss-kv-{env}-rg
          alert_id_old = f"/subscriptions/{sub}/resourceGroups/cath-ss-{env}-rg/providers/Microsoft.Insights/activityLogAlerts/Application-Insights-daily-cap-reached-cath-appinsights-{env}"
          alert_id_new = f"/subscriptions/{sub}/resourceGroups/cath-ss-kv-{env}-rg/providers/Microsoft.Insights/activityLogAlerts/Application-Insights-daily-cap-reached-cath-appinsights-{env}"
          for r in resources:
              if r.get('type') == 'azurerm_monitor_activity_log_alert' and r.get('name') == 'main' and r.get('module') == 'module.application_insights':
                  for inst in r.get('instances', []):
                      attrs = inst.get('attributes', {})
                      if attrs.get('id') == alert_id_old:
                          attrs['id'] = alert_id_new
                          attrs['resource_group_name'] = f"cath-ss-kv-{env}-rg"
                          # Also update scope references
                          if 'scope' in attrs:
                              attrs['scope'] = [s.replace(f"cath-ss-{env}-rg", f"cath-ss-kv-{env}-rg") for s in attrs.get('scope', [])]
                          if 'action' in attrs:
                              for a in attrs.get('action', []):
                                  if 'action_group_id' in a:
                                      a['action_group_id'] = a['action_group_id'].replace(f"cath-ss-{env}-rg", f"cath-ss-kv-{env}-rg")
                          print(f"Updated module.application_insights.azurerm_monitor_activity_log_alert.main[0] RG -> cath-ss-kv-{env}-rg")
                      elif attrs.get('id') == alert_id_new:
                          print(f"module.application_insights.azurerm_monitor_activity_log_alert.main[0] already pointing to cath-ss-kv-{env}-rg")

          # KV secrets - add to state from version IDs fetched by bash
          import os
          secret_map = {
              'postgres-host': 'postgres_host',
              'postgres-user': 'postgres_user',
              'postgres-password': 'postgres_password',
              'postgres-port': 'postgres_port',
              'postgres-url': 'postgres_url',
              'redis-host': 'redis_host',
              'redis-port': 'redis_port',
              'redis-access-key': 'redis_access_key',
              'redis-url': 'redis_url',
              'app-insights-connection-string': 'app_insights_connection_string',
          }
          kv_id = f"/subscriptions/{sub}/resourceGroups/cath-ss-kv-{env}-rg/providers/Microsoft.KeyVault/vaults/cath-ss-kv-{env}"
          if os.path.exists('/tmp/secret_ids.txt'):
              with open('/tmp/secret_ids.txt') as sf:
                  for line in sf:
                      line = line.strip()
                      if '=' not in line:
                          continue
                      secret_name, version_id = line.split('=', 1)
                      resource_name = secret_map.get(secret_name, secret_name.replace('-', '_'))
                      if not any(r.get('type') == 'azurerm_key_vault_secret' and r.get('name') == resource_name for r in resources):
                          resources.append({
                              "module": "", "mode": "managed",
                              "type": "azurerm_key_vault_secret", "name": resource_name,
                              "provider": "provider[\"registry.terraform.io/hashicorp/azurerm\"]",
                              "instances": [{"schema_version": 0, "attributes": {
                                  "id": version_id,
                                  "name": secret_name,
                                  "key_vault_id": kv_id,
                                  "value": "", "content_type": "", "not_before_date": None,
                                  "expiration_date": None, "tags": {}, "timeouts": None,
                                  "versionless_id": f"https://cath-ss-kv-{env}.vault.azure.net/secrets/{secret_name}"
                              }, "sensitive_attributes": [[{"type": "get_attr", "value": "value"}]], "private": ""}]
                          })
                          print(f"Added azurerm_key_vault_secret.{resource_name}")
                      else:
                          print(f"azurerm_key_vault_secret.{resource_name} already in state, skipping")

          # KV diagnostic setting
          kv_diag_id = f"{kv_id}|cath-ss-kv-{env}"
          if not any(r.get('type') == 'azurerm_monitor_diagnostic_setting' and r.get('name') == 'kv-ds' and r.get('module') == 'module.application_key_vault' for r in resources):
              resources.append({
                  "module": "module.application_key_vault", "mode": "managed",
                  "type": "azurerm_monitor_diagnostic_setting", "name": "kv-ds",
                  "provider": "provider[\"registry.terraform.io/hashicorp/azurerm\"]",
                  "instances": [{"schema_version": 0, "attributes": {
                      "id": kv_diag_id,
                      "name": f"cath-ss-kv-{env}",
                      "target_resource_id": kv_id,
                      "log_analytics_workspace_id": None,
                      "storage_account_id": None, "eventhub_name": None,
                      "eventhub_authorization_rule_id": None, "partner_solution_id": None,
                      "enabled_log": [], "metric": [], "log": [], "timeouts": None
                  }, "sensitive_attributes": [], "private": ""}]
              })
              print(f"Added module.application_key_vault.azurerm_monitor_diagnostic_setting.kv-ds")
          else:
              print("module.application_key_vault.azurerm_monitor_diagnostic_setting.kv-ds already in state, skipping")

          # KV access policies - add existing Azure policies to state
          # We MUST import them rather than delete from state, otherwise Terraform tries to CREATE
          # them and gets "already exists" errors.
          # Known Terraform resource names for access policies:
          policy_resource_names = [
              "creator_access_policy",
              "developer",           # index_key 0
              "product_team_access_policy",
              "implicit_managed_identity_access_policy",  # index_key 0
          ]
          kv_id_for_policy = f"/subscriptions/{sub}/resourceGroups/cath-ss-kv-{env}-rg/providers/Microsoft.KeyVault/vaults/cath-ss-kv-{env}"
          if _os.path.exists('/tmp/policy_ids.txt'):
              with open('/tmp/policy_ids.txt') as pf:
                  policy_object_ids = [l.strip() for l in pf if l.strip()]
              # Remove all existing policy entries to rebuild cleanly
              resources[:] = [r for r in resources if not (r.get('type') == 'azurerm_key_vault_access_policy' and r.get('module') == 'module.application_key_vault')]
              # Re-add each policy with a round-robin assignment to the known resource names
              # The exact mapping doesn't matter for state-correctness as long as each policy_id is tracked
              for i, obj_id in enumerate(policy_object_ids):
                  if i < len(policy_resource_names):
                      r_name = policy_resource_names[i]
                      # Some resources use index_key 0 (developer[0], implicit_managed_identity_access_policy[0])
                      uses_index = r_name in ("developer", "implicit_managed_identity_access_policy")
                      policy_az_id = f"{kv_id_for_policy}/objectId/{obj_id}"
                      entry = {
                          "module": "module.application_key_vault", "mode": "managed",
                          "type": "azurerm_key_vault_access_policy", "name": r_name,
                          "provider": "provider[\"registry.terraform.io/hashicorp/azurerm\"]",
                          "instances": [{"schema_version": 0, "attributes": {
                              "id": policy_az_id,
                              "key_vault_id": kv_id_for_policy,
                              "object_id": obj_id,
                              "tenant_id": "531ff96d-0ae9-462a-8d2d-bec7c0b42082",
                              "application_id": "",
                              "certificate_permissions": [],
                              "key_permissions": [],
                              "secret_permissions": [],
                              "storage_permissions": [],
                              "timeouts": None
                          }, "sensitive_attributes": [], "private": ""}]
                      }
                      if uses_index:
                          entry["instances"][0]["index_key"] = 0
                      resources.append(entry)
                      print(f"Added module.application_key_vault.azurerm_key_vault_access_policy.{r_name}{'[0]' if uses_index else ''} -> objectId/{obj_id}")
                  else:
                      print(f"WARNING: more policies in Azure ({len(policy_object_ids)}) than Terraform resource names ({len(policy_resource_names)}), skipping objectId/{obj_id}")
          else:
              print("WARNING: /tmp/policy_ids.txt not found, skipping KV access policy state patch")

          state['serial'] = state.get('serial', 0) + 1
          with open('/tmp/terraform.tfstate.new', 'w') as f:
              json.dump(state, f, indent=2)
          print("State file written")
          PYEOF

          az storage blob upload \
            --account-name sdsstatedemo \
            --container-name tfstate-demo \
            --name "cath-service/demo/terraform.tfstate" \
            --file /tmp/terraform.tfstate.new \
            --account-key "${STORAGE_KEY}" \
            --overwrite
          echo "Demo state patched successfully"

  import-test:
    name: Import - Test
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login (Test)
        run: |
          echo '${{ secrets.AZURE_CREDENTIALS_SDS_TEST }}' | python3 -c "
          import sys, json, subprocess
          creds = json.load(sys.stdin)
          subprocess.run([
            'az', 'login', '--service-principal',
            '--username', creds['clientId'],
            '--password', creds['clientSecret'],
            '--tenant', creds['tenantId']
          ], check=True)
          subprocess.run(['az', 'account', 'set', '--subscription', creds['subscriptionId']], check=True)
          "

      - name: Patch Test State
        run: |
          SUB="3eec5bde-7feb-4566-bfb6-805df6e10b90"
          STORAGE_KEY=$(az storage account keys list \
            --account-name sdsstatetest \
            --resource-group jenkins-state-test \
            --query "[0].value" \
            --output tsv)

          az storage blob download \
            --account-name sdsstatetest \
            --container-name tfstate-test \
            --name "cath-service/test/terraform.tfstate" \
            --file /tmp/terraform.tfstate \
            --account-key "${STORAGE_KEY}"

          # Fetch KV secret version IDs
          rm -f /tmp/secret_ids.txt
          for secret in postgres-host postgres-user postgres-password postgres-port postgres-url \
                        redis-host redis-port redis-access-key redis-url app-insights-connection-string; do
            vid=$(az keyvault secret show --vault-name "cath-ss-kv-test" --name "$secret" \
              --query "id" -o tsv 2>/dev/null || true)
            [ -n "$vid" ] && echo "${secret}=${vid}" >> /tmp/secret_ids.txt \
              || echo "WARNING: secret $secret not found in vault"
          done

          # Fetch KV access policy object IDs
          az keyvault show --name "cath-ss-kv-test" --resource-group "cath-ss-kv-test-rg" \
            --query "properties.accessPolicies[].objectId" -o tsv 2>/dev/null \
            > /tmp/policy_ids.txt || echo "WARNING: could not fetch access policies"
          echo "Access policy object IDs:"
          cat /tmp/policy_ids.txt || true

          # Fetch PE details from Azure
          az network private-endpoint show \
            --name "cath-test" \
            --resource-group "cath-cache-test" \
            -o json 2>/dev/null > /tmp/pe_details.json \
