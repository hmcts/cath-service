          terraform init \
            -backend-config="resource_group_name=jenkins-state-test" \
            -backend-config="storage_account_name=sdsstatetest" \
            -backend-config="container_name=tfstate-test" \
            -backend-config="key=cath-service/test/terraform.tfstate" \
            -backend-config="access_key=${STORAGE_KEY}"

          SUB="3eec5bde-7feb-4566-bfb6-805df6e10b90"

          # Import the existing cath-cache-test resource group into azurerm_resource_group.redis_rg
          terraform import azurerm_resource_group.redis_rg \
            "/subscriptions/${SUB}/resourceGroups/cath-cache-test" \
            && echo "Imported redis_rg" \
