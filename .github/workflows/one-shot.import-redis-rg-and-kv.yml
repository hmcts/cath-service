name: One-Shot - Import Redis RG and KV Into State

# Imports cath-cache-{env} resource group and cath-ss-kv-{env} key vault
# into Terraform state so the next apply does not try to create resources
# that already exist in Azure.
#
# Run this ONCE after the state removal workflow, before retriggering infra.

on:
  workflow_dispatch:

jobs:
  import-demo:
    name: Import - Demo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Terraform
        run: |
          wget -qO /tmp/terraform.zip https://releases.hashicorp.com/terraform/1.15.3/terraform_1.15.3_linux_amd64.zip
          unzip -o /tmp/terraform.zip -d /usr/local/bin/
          terraform version

      - name: Azure Login (Demo)
        run: |
          echo '${{ secrets.AZURE_CREDENTIALS_SDS_DEMO }}' | python3 -c "
          import sys, json, subprocess
          creds = json.load(sys.stdin)
          subprocess.run([
            'az', 'login', '--service-principal',
            '--username', creds['clientId'],
            '--password', creds['clientSecret'],
            '--tenant', creds['tenantId']
          ], check=True)
          subprocess.run(['az', 'account', 'set', '--subscription', creds['subscriptionId']], check=True)
          "

      - name: Import Demo Redis RG and KV Into State
        working-directory: infrastructure
        run: |
          STORAGE_KEY=$(az storage account keys list \
            --account-name sdsstatedemo \
            --resource-group jenkins-state-demo \
            --query "[0].value" \
            --output tsv)

          terraform init \
            -backend-config="resource_group_name=jenkins-state-demo" \
            -backend-config="storage_account_name=sdsstatedemo" \
            -backend-config="container_name=tfstate-demo" \
            -backend-config="key=cath-service/demo/terraform.tfstate" \
            -backend-config="access_key=${STORAGE_KEY}"

          SUB="c68a4bed-4c3d-4956-af51-4ae164c1957c"

          # Import the existing cath-cache-demo resource group into azurerm_resource_group.redis_rg
          terraform import azurerm_resource_group.redis_rg \
            "/subscriptions/${SUB}/resourceGroups/cath-cache-demo" \
            && echo "Imported redis_rg" \
            || echo "WARNING: redis_rg import failed (may already be in state)"

          # Import the existing cath-ss-kv-demo key vault into the module state
          terraform import "module.application_key_vault.azurerm_key_vault.kv" \
            "/subscriptions/${SUB}/resourceGroups/cath-ss-kv-demo-rg/providers/Microsoft.KeyVault/vaults/cath-ss-kv-demo" \
            && echo "Imported application_key_vault.kv" \
            || echo "WARNING: application_key_vault.kv import failed (may already be in state)"

  import-test:
    name: Import - Test
    runs-on: ubuntu-latest
