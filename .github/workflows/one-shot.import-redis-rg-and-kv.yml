                          if 'scope' in attrs:
                              attrs['scope'] = [s.replace(f"cath-ss-{env}-rg", f"cath-ss-kv-{env}-rg") for s in attrs.get('scope', [])]
                          print(f"Updated module.application_insights.azurerm_monitor_activity_log_alert.main[0] RG -> cath-ss-kv-{env}-rg")
                      elif attrs.get('id') == alert_id_new:
                          print(f"module.application_insights.azurerm_monitor_activity_log_alert.main[0] already pointing to cath-ss-kv-{env}-rg")

          # KV secrets - add to state from version IDs fetched by bash
          secret_map = {
              'postgres-host': 'postgres_host',
              'postgres-user': 'postgres_user',
              'postgres-password': 'postgres_password',
              'postgres-port': 'postgres_port',
              'postgres-url': 'postgres_url',
              'redis-host': 'redis_host',
              'redis-port': 'redis_port',
              'redis-access-key': 'redis_access_key',
              'redis-url': 'redis_url',
              'app-insights-connection-string': 'app_insights_connection_string',
          }
          kv_id = f"/subscriptions/{sub}/resourceGroups/cath-ss-kv-{env}-rg/providers/Microsoft.KeyVault/vaults/cath-ss-kv-{env}"
          if _os.path.exists('/tmp/secret_ids.txt'):
              with open('/tmp/secret_ids.txt') as sf:
                  for line in sf:
                      line = line.strip()
                      if '=' not in line:
                          continue
                      secret_name, version_id = line.split('=', 1)
                      resource_name = secret_map.get(secret_name, secret_name.replace('-', '_'))
                      if not any(r.get('type') == 'azurerm_key_vault_secret' and r.get('name') == resource_name for r in resources):
                          resources.append({
                              "module": "", "mode": "managed",
                              "type": "azurerm_key_vault_secret", "name": resource_name,
                              "provider": "provider[\"registry.terraform.io/hashicorp/azurerm\"]",
                              "instances": [{"schema_version": 0, "attributes": {
                                  "id": version_id, "name": secret_name, "key_vault_id": kv_id,
                                  "value": "", "content_type": "", "not_before_date": None,
                                  "expiration_date": None, "tags": {}, "timeouts": None,
                                  "versionless_id": f"https://cath-ss-kv-{env}.vault.azure.net/secrets/{secret_name}"
                              }, "sensitive_attributes": [[{"type": "get_attr", "value": "value"}]], "private": ""}]
                          })
                          print(f"Added azurerm_key_vault_secret.{resource_name}")
                      else:
                          print(f"azurerm_key_vault_secret.{resource_name} already in state, skipping")

          # KV diagnostic setting
          kv_diag_id = f"{kv_id}|cath-ss-kv-{env}"
          if not any(r.get('type') == 'azurerm_monitor_diagnostic_setting' and r.get('name') == 'kv-ds' and r.get('module') == 'module.application_key_vault' for r in resources):
              resources.append({
                  "module": "module.application_key_vault", "mode": "managed",
                  "type": "azurerm_monitor_diagnostic_setting", "name": "kv-ds",
                  "provider": "provider[\"registry.terraform.io/hashicorp/azurerm\"]",
                  "instances": [{"schema_version": 0, "attributes": {
                      "id": kv_diag_id, "name": f"cath-ss-kv-{env}",
                      "target_resource_id": kv_id, "log_analytics_workspace_id": None,
                      "storage_account_id": None, "eventhub_name": None,
                      "eventhub_authorization_rule_id": None, "partner_solution_id": None,
                      "enabled_log": [], "metric": [], "log": [], "timeouts": None
                  }, "sensitive_attributes": [], "private": ""}]
              })
              print(f"Added module.application_key_vault.azurerm_monitor_diagnostic_setting.kv-ds")
          else:
              print("module.application_key_vault.azurerm_monitor_diagnostic_setting.kv-ds already in state, skipping")

          # KV access policies - add existing Azure policies to state
          policy_resource_names = [
              "creator_access_policy",
              "developer",
              "product_team_access_policy",
              "implicit_managed_identity_access_policy",
          ]
          kv_id_for_policy = f"/subscriptions/{sub}/resourceGroups/cath-ss-kv-{env}-rg/providers/Microsoft.KeyVault/vaults/cath-ss-kv-{env}"
          if _os.path.exists('/tmp/policy_ids.txt'):
              with open('/tmp/policy_ids.txt') as pf:
                  policy_object_ids = [l.strip() for l in pf if l.strip()]
              resources[:] = [r for r in resources if not (r.get('type') == 'azurerm_key_vault_access_policy' and r.get('module') == 'module.application_key_vault')]
              for i, obj_id in enumerate(policy_object_ids):
                  if i < len(policy_resource_names):
                      r_name = policy_resource_names[i]
                      uses_index = r_name in ("developer", "implicit_managed_identity_access_policy")
                      policy_az_id = f"{kv_id_for_policy}/objectId/{obj_id}"
                      entry = {
                          "module": "module.application_key_vault", "mode": "managed",
                          "type": "azurerm_key_vault_access_policy", "name": r_name,
                          "provider": "provider[\"registry.terraform.io/hashicorp/azurerm\"]",
                          "instances": [{"schema_version": 0, "attributes": {
                              "id": policy_az_id, "key_vault_id": kv_id_for_policy,
                              "object_id": obj_id, "tenant_id": "531ff96d-0ae9-462a-8d2d-bec7c0b42082",
                              "application_id": "", "certificate_permissions": [],
                              "key_permissions": [], "secret_permissions": [],
                              "storage_permissions": [], "timeouts": None
                          }, "sensitive_attributes": [], "private": ""}]
                      }
                      if uses_index:
                          entry["instances"][0]["index_key"] = 0
                      resources.append(entry)
                      print(f"Added module.application_key_vault.azurerm_key_vault_access_policy.{r_name}{'[0]' if uses_index else ''} -> objectId/{obj_id}")
                  else:
                      print(f"WARNING: extra policy objectId/{obj_id} - no matching Terraform resource name")
          else:
              print("WARNING: /tmp/policy_ids.txt not found, skipping KV access policy state patch")

          state['serial'] = state.get('serial', 0) + 1
          with open('/tmp/terraform.tfstate.new', 'w') as f:
              json.dump(state, f, indent=2)
          print("State file written")
          PYEOF

          az storage blob upload \
            --account-name sdsstatestg \
            --container-name tfstate-stg \
            --name "cath-service/stg/terraform.tfstate" \
            --file /tmp/terraform.tfstate.new \
            --account-key "${STORAGE_KEY}" \
            --overwrite
          echo "STG state patched successfully"
