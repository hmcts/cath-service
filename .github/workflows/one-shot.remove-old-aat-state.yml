name: One-Shot - Remove Old AAT Resources From State

# Removes old CNP AAT resources from terraform state so the next apply
# creates new CNP infra without attempting to destroy locked/inaccessible
# old resources. Old Azure resources are left in place for manual cleanup.
#
# Also imports existing cath-cache-aat RG into the new redis module path.
#
# Run this ONCE then re-run the AAT infrastructure apply.

on:
  workflow_dispatch:

jobs:
  remove-old-aat-state:
    name: Remove Old AAT Resources From State
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version_file: infrastructure/.terraform-version
          terraform_wrapper: false

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_CFT_PREVIEW }}

      - name: Remove Old AAT Resources From State
        working-directory: infrastructure
        run: |
          az account set --subscription "DCD-CNP-DEV"
          echo "Active subscription: $(az account show --query '[name, id]' -o tsv)"

          STORAGE_KEY=$(az storage account keys list \
            --account-name mgmtstatestorenonprod \
            --resource-group mgmt-state-store-nonprod \
            --query "[0].value" \
            --output tsv)

          terraform init \
            -backend-config="resource_group_name=mgmt-state-store-nonprod" \
            -backend-config="storage_account_name=mgmtstatestorenonprod" \
            -backend-config="container_name=mgmtstatestorecontaineraat" \
            -backend-config="key=cath-service/aat/terraform.tfstate" \
            -backend-config="access_key=${STORAGE_KEY}"

          # Remove old storage account module (causes terraform init to fail trying to load it)
          for r in $(terraform state list 2>/dev/null | grep "^module\.sa\."); do
            terraform state rm "$r" && echo "Removed $r" || echo "WARNING: $r not in state, skipping"
          done

          # Remove old KV secrets
          for r in \
            azurerm_key_vault_secret.postgres_host \
            azurerm_key_vault_secret.postgres_user \
            azurerm_key_vault_secret.postgres_password \
            azurerm_key_vault_secret.postgres_port \
            azurerm_key_vault_secret.postgres_url \
            azurerm_key_vault_secret.redis_host \
            azurerm_key_vault_secret.redis_port \
            azurerm_key_vault_secret.redis_access_key \
            azurerm_key_vault_secret.redis_url \
            azurerm_key_vault_secret.app_insights_connection_string; do
            terraform state rm "$r" && echo "Removed $r" || echo "WARNING: $r not in state, skipping"
          done

          # Remove old Key Vault modules
          for r in \
            "module.application_key_vault.azurerm_key_vault.kv" \
            "module.application_key_vault.azurerm_key_vault_access_policy.creator_access_policy" \
            "module.application_key_vault.azurerm_key_vault_access_policy.developer[0]" \
            "module.application_key_vault.azurerm_key_vault_access_policy.product_team_access_policy" \
            "module.application_key_vault.azurerm_key_vault_access_policy.implicit_managed_identity_access_policy[0]" \
            "module.application_key_vault.azurerm_monitor_diagnostic_setting.kv-ds" \
            "module.application_key_vault.azurerm_user_assigned_identity.managed_identity[0]" \
            "module.key_vault.azurerm_key_vault.kv" \
            "module.key_vault.azurerm_key_vault_access_policy.creator_access_policy" \
            "module.key_vault.azurerm_key_vault_access_policy.developer[0]" \
            "module.key_vault.azurerm_key_vault_access_policy.product_team_access_policy" \
            "module.key_vault.azurerm_monitor_diagnostic_setting.kv-ds" \
            "module.key_vault.azurerm_user_assigned_identity.managed_identity[0]"; do
            terraform state rm "$r" && echo "Removed $r" || echo "WARNING: $r not in state, skipping"
          done

          # Remove old RGs
          for r in \
            azurerm_resource_group.ss_kv_rg \
            azurerm_resource_group.app_kv_rg \
            azurerm_resource_group.rg \
            azurerm_resource_group.redis_rg \
            azurerm_resource_group.bootstrap_rg \
            azurerm_resource_group.postgres_rg; do
            terraform state rm "$r" && echo "Removed $r" || echo "WARNING: $r not in state, skipping"
          done

          # Remove old bootstrap / third-party KV modules
          for r in \
            "module.key_vault_bootstrap.azurerm_key_vault.kv" \
            "module.key_vault_bootstrap.azurerm_key_vault_access_policy.creator_access_policy" \
            "module.key_vault_bootstrap.azurerm_key_vault_access_policy.developer[0]" \
            "module.key_vault_bootstrap.azurerm_key_vault_access_policy.product_team_access_policy" \
            "module.key_vault_bootstrap.azurerm_monitor_diagnostic_setting.kv-ds" \
            "module.key_vault_bootstrap.azurerm_user_assigned_identity.managed_identity[0]" \
            "module.third_party_key_vault.azurerm_key_vault.kv" \
            "module.third_party_key_vault.azurerm_key_vault_access_policy.creator_access_policy" \
            "module.third_party_key_vault.azurerm_key_vault_access_policy.developer[0]" \
            "module.third_party_key_vault.azurerm_key_vault_access_policy.product_team_access_policy" \
            "module.third_party_key_vault.azurerm_monitor_diagnostic_setting.kv-ds" \
            "module.third_party_key_vault.azurerm_user_assigned_identity.managed_identity[0]"; do
            terraform state rm "$r" && echo "Removed $r" || echo "WARNING: $r not in state, skipping"
          done

          # Remove remaining old PostgreSQL resources
          for r in \
            "module.postgresql.random_password.password" \
            "module.postgresql.terraform_data.trigger_password_reset"; do
            terraform state rm "$r" && echo "Removed $r" || echo "WARNING: $r not in state, skipping"
          done

          # Remove old App Insights
          for r in \
            "module.application_insights.azurerm_application_insights.this" \
            "module.application_insights.azurerm_monitor_activity_log_alert.main[0]"; do
            terraform state rm "$r" && echo "Removed $r" || echo "WARNING: $r not in state, skipping"
          done

          # Remove old PostgreSQL
          for r in \
            "module.postgresql.azurerm_postgresql_flexible_server.pgsql_server" \
            "module.postgresql.azurerm_postgresql_flexible_server_database.pg_databases[\"cath\"]" \
            "module.postgresql.azurerm_postgresql_flexible_server_active_directory_administrator.pgsql_adadmin" \
            "module.postgresql.azurerm_postgresql_flexible_server_active_directory_administrator.pgsql_principal_admin[0]" \
            "module.postgresql.azurerm_postgresql_flexible_server_configuration.pgsql_server_config[\"backslash_quote\"]" \
            "module.postgresql.null_resource.set-user-permissions-additionaldbs[\"cath\"]" \
            "module.postgresql.azurerm_resource_group.rg[0]"; do
            terraform state rm "$r" && echo "Removed $r" || echo "WARNING: $r not in state, skipping"
          done

          # Remove old Redis
          for r in \
            "module.redis.azurerm_redis_cache.redis" \
            "module.redis.azurerm_private_endpoint.this[0]" \
            "module.redis.azurerm_resource_group.cache-resourcegroup[0]"; do
            terraform state rm "$r" && echo "Removed $r" || echo "WARNING: $r not in state, skipping"
          done

          SUBSCRIPTION_ID=$(az account show --subscription "DCD-CNP-DEV" --query id -o tsv)
          AKS_SUBSCRIPTION_ID=$(az account show --subscription "DCD-CFTAPPS-STG" --query id -o tsv)
          TENANT_ID=$(az account show --query tenantId -o tsv)
          CLIENT_ID=$(az account show --query user.name -o tsv)
          SP_OBJECT_ID=$(az ad sp show --id "$CLIENT_ID" --query id -o tsv)

          IMPORT_VARS="-var subscription=${SUBSCRIPTION_ID} -var aks_subscription_id=${AKS_SUBSCRIPTION_ID} -var env=aat -var product=cath -var tenant_id=${TENANT_ID} -var ci_service_principal_object_id=${SP_OBJECT_ID}"

          # Import resources that already exist in Azure but aren't in state
          import_resource() {
            local addr="$1" id="$2" label="$3"
            terraform import $IMPORT_VARS "$addr" "$id" \
              && echo "Imported $label" \
              || echo "WARNING: $label import failed, may not be needed"
          }

          import_resource "azurerm_resource_group.rg" \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/cath-aat-cath" \
            "cath-aat-cath RG"

          import_resource "module.postgresql.azurerm_resource_group.rg[0]" \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/cath-aat-data-aat" \
            "cath-aat-data-aat RG"

          import_resource "module.redis.azurerm_resource_group.cache-resourcegroup[0]" \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/cath-cache-aat" \
            "cath-cache-aat RG"

          import_resource "module.key_vault.azurerm_key_vault.kv" \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/cath-aat/providers/Microsoft.KeyVault/vaults/cath-aat" \
            "cath-aat Key Vault"

          import_resource "module.key_vault.azurerm_user_assigned_identity.managed_identity[0]" \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/managed-identities-aat-rg/providers/Microsoft.ManagedIdentity/userAssignedIdentities/cath-aat-mi" \
            "cath-aat-mi managed identity"

          import_resource "module.key_vault.azurerm_key_vault_access_policy.developer[0]" \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/cath-aat/providers/Microsoft.KeyVault/vaults/cath-aat/objectId/b2a1773c-a5ae-48b5-b5fa-95b0e05eee05" \
            "cath-aat KV developer access policy"

          import_resource "module.key_vault.azurerm_key_vault_access_policy.creator_access_policy" \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/cath-aat/providers/Microsoft.KeyVault/vaults/cath-aat/objectId/69aa7255-12ea-45a3-af45-e9d249cddfe0" \
            "cath-aat KV creator access policy"

          import_resource "module.key_vault.azurerm_key_vault_access_policy.product_team_access_policy" \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/cath-aat/providers/Microsoft.KeyVault/vaults/cath-aat/objectId/b2a1773c-a5ae-48b5-b5fa-95b0e05eee05" \
            "cath-aat KV product team access policy"

          import_resource "module.key_vault.azurerm_monitor_diagnostic_setting.kv-ds" \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/cath-aat/providers/Microsoft.KeyVault/vaults/cath-aat|cath-aat" \
            "cath-aat KV diagnostic setting"

          import_resource "module.application_insights.azurerm_application_insights.this" \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/cath-aat-cath/providers/Microsoft.Insights/components/cath-cath-appinsights-aat" \
            "cath-cath-appinsights-aat"

          import_resource "module.postgresql.azurerm_postgresql_flexible_server.pgsql_server" \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/cath-aat-data-aat/providers/Microsoft.DBforPostgreSQL/flexibleServers/cath-aat-aat" \
            "cath-aat postgres server"

          import_resource "module.postgresql.azurerm_postgresql_flexible_server_database.pg_databases[\"cath\"]" \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/cath-aat-data-aat/providers/Microsoft.DBforPostgreSQL/flexibleServers/cath-aat-aat/databases/cath" \
            "cath-aat postgres database"

          import_resource "module.postgresql.azurerm_postgresql_flexible_server_active_directory_administrator.pgsql_adadmin" \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/cath-aat-data-aat/providers/Microsoft.DBforPostgreSQL/flexibleServers/cath-aat-aat/administrators/3c52c98b-07a3-4a97-92b9-298e86bb1ca9" \
            "cath-aat postgres AAD admin"

          import_resource "module.redis.azurerm_redis_cache.redis" \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/cath-cache-aat/providers/Microsoft.Cache/redis/cath-cath-aat" \
            "cath-cath-aat redis cache"

          import_resource "module.sa.azurerm_storage_account.storage_account" \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/cath-aat-cath/providers/Microsoft.Storage/storageAccounts/cathsaaat" \
            "cathsaaat storage account"

          import_resource 'module.sa.azurerm_storage_container.container["artefact"]' \
            "https://cathsaaat.blob.core.windows.net/artefact" \
            "cathsaaat/artefact container"

          import_resource 'module.sa.azurerm_storage_container.container["files"]' \
            "https://cathsaaat.blob.core.windows.net/files" \
            "cathsaaat/files container"

          import_resource 'module.sa.azurerm_storage_container.container["publications"]' \
            "https://cathsaaat.blob.core.windows.net/publications" \
            "cathsaaat/publications container"

          import_resource "azurerm_key_vault_secret.app_insights_connection_string" \
            "https://cath-aat.vault.azure.net/secrets/app-insights-connection-string/9982370c496f47ba977216a558069df5" \
            "cath-aat app-insights-connection-string KV secret"

          import_resource "azurerm_key_vault_secret.postgres_host" \
            "https://cath-aat.vault.azure.net/secrets/postgres-host/8bc81b12b4d048c5a18da42099f83b13" \
            "cath-aat postgres-host KV secret"

          import_resource "azurerm_key_vault_secret.postgres_user" \
            "https://cath-aat.vault.azure.net/secrets/postgres-user/e8ba7a6299ee4e00bdb50850639b01e9" \
            "cath-aat postgres-user KV secret"

          import_resource "azurerm_key_vault_secret.postgres_password" \
            "https://cath-aat.vault.azure.net/secrets/postgres-password/00747e5bbcd347ce87d058faaf4cca72" \
            "cath-aat postgres-password KV secret"

          import_resource "azurerm_key_vault_secret.postgres_port" \
            "https://cath-aat.vault.azure.net/secrets/postgres-port/289ea4bb118247cb92bb7282d8fce101" \
            "cath-aat postgres-port KV secret"

          import_resource "azurerm_key_vault_secret.postgres_url" \
            "https://cath-aat.vault.azure.net/secrets/postgres-url/890a74c9936943959a567086e5e40049" \
            "cath-aat postgres-url KV secret"

          import_resource "module.postgresql.azurerm_postgresql_flexible_server_active_directory_administrator.pgsql_principal_admin[0]" \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/cath-aat-data-aat/providers/Microsoft.DBforPostgreSQL/flexibleServers/cath-aat-aat/administrators/69aa7255-12ea-45a3-af45-e9d249cddfe0" \
            "cath-aat postgres SP admin"

          import_resource "module.redis.azurerm_private_endpoint.this[0]" \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/cath-cache-aat/providers/Microsoft.Network/privateEndpoints/cath-aat" \
            "cath-aat redis private endpoint"

          import_resource "module.application_insights.azurerm_monitor_activity_log_alert.main[0]" \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/cath-aat-cath/providers/Microsoft.Insights/activityLogAlerts/Application-Insights-daily-cap-reached-cath-cath-appinsights-aat" \
            "cath-cath-appinsights-aat activity log alert"
