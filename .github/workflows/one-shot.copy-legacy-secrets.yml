name: One-Shot - Copy Legacy SDS Secrets to CNP cath-aat KV

# Copies the application secrets from the legacy SDS key vault
# (cath-ss-kv-stg in DCD-PIP-STG) into the new CNP key vault (cath-aat in
# DCD-CNP-DEV). The CFT-PREVIEW CI service principal already has Get on the
# source and Set on the destination, so a single login is enough.
#
# Run once from VIBE-465 (or any branch carrying this file). Delete the file
# after the legacy SDS KV is decommissioned.

on:
  workflow_dispatch:

jobs:
  copy:
    name: Copy secrets cath-ss-kv-stg -> cath-aat
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login (CFT-PREVIEW CI SP)
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_CFT_PREVIEW }}

      - name: Copy secrets
        env:
          SRC_VAULT: cath-ss-kv-stg
          SRC_SUB: 74dacd4f-a248-45bb-a2f0-af700dc4cf68
          DST_VAULT: cath-aat
          DST_SUB: 1c4f0704-a29e-403d-b719-b90c34ef14c9
        run: |
          set -euo pipefail
          SECRETS=(
            session-secret
            govuk-notify-api-key
            sso-client-id
            sso-client-secret
            sso-issuer-url
            sso-sg-system-admin
            sso-sg-admin-ctsc
            sso-sg-admin-local
            cft-idam-client-secret
            auto-pip-stg-courtel-api
            courtel-certificate
            b2c-tenant-id
            auto-pip-stg-pip-account-management-stg-id
            auto-pip-stg-pip-account-management-stg-pwd
            b2c-ad-url
            app-tenant-id
            app-pip-data-management-id
            app-pip-data-management-scope
            xhibit-s3-access-key
            xhibit-s3-access-key-secret
          )
          for s in "${SECRETS[@]}"; do
            v=$(az keyvault secret show --vault-name "$SRC_VAULT" --subscription "$SRC_SUB" --name "$s" --query value -o tsv)
            az keyvault secret set --vault-name "$DST_VAULT" --subscription "$DST_SUB" --name "$s" --value "$v" --output none
            echo "Copied: $s"
          done
