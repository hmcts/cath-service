name: Infrastructure Stage

on:
  workflow_call:
    inputs:
      plan-only:
        required: false
        type: boolean
        default: false
        description: "Run plan only, skip apply"
    outputs:
      plan-exitcode:
        description: "Terraform plan exit code (0=no changes, 2=changes)"
        value: ${{ jobs.terraform.outputs.plan-exitcode }}

jobs:
  terraform-fmt:
    name: Terraform Format
    uses: ./.github/workflows/job.terraform-fmt.yml

  terraform:
    name: Terraform
    needs: [terraform-fmt]
    uses: ./.github/workflows/job.terraform.yml
    with:
      environment: stg
      subscription: DTS-SHAREDSERVICES-STG
      aks-subscription: DTS-SHAREDSERVICES-STG
      storage-account: nonprod
      plan-only: ${{ inputs.plan-only }}
    secrets:
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS_SDS_STG }}

  bootstrap-stg:
    name: Bootstrap STG
    needs: [terraform]
    uses: ./.github/workflows/job.terraform.yml
    with:
      environment: stg
      subscription: DTS-SHAREDSERVICES-STG
      aks-subscription: DTS-SHAREDSERVICES-STG
      storage-account: nonprod
      working-directory: infrastructure/bootstrap
      state-store-container-name: tfstate-stg-bootstrap
      plan-only: ${{ inputs.plan-only }}
    secrets:
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS_SDS_STG }}

  bootstrap-demo:
    name: Bootstrap DEMO
    needs: [terraform-fmt]
    uses: ./.github/workflows/job.terraform.yml
    with:
      environment: demo
      subscription: DTS-SHAREDSERVICES-DEMO
      aks-subscription: DTS-SHAREDSERVICES-DEMO
      storage-account: nonprod
      working-directory: infrastructure/bootstrap
      state-store-container-name: tfstate-demo-bootstrap
      plan-only: ${{ inputs.plan-only }}
    secrets:
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS_SDS_DEMO }}

  bootstrap-ithc:
    name: Bootstrap ITHC
    needs: [terraform-fmt]
    uses: ./.github/workflows/job.terraform.yml
    with:
      environment: ithc
      subscription: DTS-SHAREDSERVICES-ITHC
      aks-subscription: DTS-SHAREDSERVICES-ITHC
      storage-account: nonprod
      working-directory: infrastructure/bootstrap
      state-store-container-name: tfstate-ithc-bootstrap
      plan-only: ${{ inputs.plan-only }}
    secrets:
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS_SDS_ITHC }}

  bootstrap-test:
    name: Bootstrap TEST
    needs: [terraform-fmt]
    uses: ./.github/workflows/job.terraform.yml
    with:
      environment: test
      subscription: DTS-SHAREDSERVICES-TEST
      aks-subscription: DTS-SHAREDSERVICES-TEST
      storage-account: nonprod
      working-directory: infrastructure/bootstrap
      state-store-container-name: tfstate-test-bootstrap
      plan-only: ${{ inputs.plan-only }}
    secrets:
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS_SDS_TEST }}
