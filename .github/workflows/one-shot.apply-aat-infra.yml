name: One-Shot - Apply AAT Infrastructure

# Runs terraform apply against AAT on the current branch.
# The PR pipeline only runs plan-only; use this to provision CNP AAT infra
# before merging, so Preview deployments can be tested against live infra.
#
# Run this once from the VIBE-465 branch, then trigger a Preview build.

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
    paths:
      - 'infrastructure/**'

jobs:
  terraform:
    name: Terraform Apply - AAT
    uses: ./.github/workflows/stage.infrastructure.yml
    with:
      plan-only: false
    secrets: inherit
