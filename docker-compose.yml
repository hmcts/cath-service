services:
  postgres:
    image: postgres:18-alpine
    container_name: cath-postgres
    environment:
      POSTGRES_USER: hmcts
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hmcts -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:8-alpine
    container_name: cath-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    command: redis-server --appendonly yes

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: cath-azurite
    ports:
      - "10000:10000"
    volumes:
      - azurite_data:/data
    command: azurite-blob --blobHost 0.0.0.0 --blobPort 10000

volumes:
  postgres_data:
  redis_data:
  azurite_data: